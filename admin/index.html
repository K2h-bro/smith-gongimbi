<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Smith — 관리자</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<!-- ── 로그인 ── -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <img src="../images/logo3.png" class="login-logo" alt="The Smith" style="mix-blend-mode:screen;">
    <div class="login-title">The Smith</div>
    <div class="login-sub">Admin · 관리자</div>
    <input type="password" id="pass-input" placeholder="비밀번호">
    <button id="login-btn">로그인</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── 관리자 화면 ── -->
<div class="admin-wrap" id="admin-wrap">

  <!-- 상단 바 -->
  <div class="topbar">
    <div class="topbar-brand">
      <img src="../images/logo3.png" alt="logo" style="height:24px;width:auto;object-fit:contain;mix-blend-mode:screen;">
      The Smith
      <span class="topbar-badge">Admin</span>
    </div>
    <div class="topbar-actions">
      <a href="index.html" target="_blank" id="preview-btn" class="btn btn-outline">미리보기</a>
      <button id="reset-btn" class="btn btn-outline">초기화</button>
      <button id="save-btn" class="btn btn-gold">저장 · 적용</button>
      <button id="logout-btn" class="btn btn-outline">로그아웃</button>
    </div>
  </div>

  <div class="admin-content">

    <!-- 공임비 항목 -->
    <div class="section">
      <div class="section-head">
        <span class="section-title">공임비 항목 관리</span>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-size:10px;color:var(--muted);">가격 셀 비우면 — 표시 / 단위: 만원</span>
          <button id="add-cat-btn" class="btn btn-success btn-sm">+ 카테고리 추가</button>
        </div>
      </div>
      <div class="section-body">
        <div id="categories-container"></div>
      </div>
    </div>

    <!-- 추가 서비스 -->
    <div class="section">
      <div class="section-head">
        <span class="section-title">추가 서비스 항목</span>
      </div>
      <div class="section-body">
        <textarea class="list-editor" id="addl-editor"></textarea>
        <p class="list-hint">한 줄에 하나씩 입력하세요.</p>
      </div>
    </div>

    <!-- 안내 사항 -->
    <div class="section">
      <div class="section-head">
        <span class="section-title">안내 사항 (Notes)</span>
      </div>
      <div class="section-body">
        <textarea class="list-editor" id="notes-editor"></textarea>
        <p class="list-hint">한 줄에 하나씩 입력하세요. 순서대로 i, ii, iii… 번호가 붙습니다.</p>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../js/data.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
