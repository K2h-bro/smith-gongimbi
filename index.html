<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Smith — Tesla 설치 및 장착 공임비</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page">

  <!-- ── 헤더 ── -->
  <header class="header">
    <div class="header-inner">
      <div class="brand-block">
        <div class="brand-tag">Mobility Platform Company · Korea</div>
        <div class="brand-name">
          <img src="images/logo3.png" class="smith-logo-img" alt="The Smith">
        </div>
      </div>
      <div class="header-right">
        <div class="doc-title">Tesla 설치 및 장착 공임비</div>
        <div class="doc-subtitle">Installation &amp; Fitting — Labor Guide</div>
        <div class="unit-note">단위 : 만원 (VAT 포함)</div>
      </div>
    </div>
  </header>

  <!-- ── 차종 선택 탭 ── -->
  <section class="car-selector">
    <button class="car-tab active" data-car="juniper">주니퍼</button>
    <button class="car-tab" data-car="highland">하이랜드</button>
    <button class="car-tab" data-car="threey">3 · Y</button>
    <button class="car-tab" data-car="sx">S · X</button>
  </section>

  <!-- ── 공임비 콘텐츠 (JS 렌더링) ── -->
  <div class="price-content" id="price-content"></div>

  <!-- ── 추가 서비스 ── -->
  <div class="addl-section">
    <div class="addl-title">추가 서비스 항목</div>
    <div class="addl-tags" id="addl-tags"></div>
  </div>

  <!-- ── 안내 사항 ── -->
  <div class="notes-section" id="notes-section"></div>

  <!-- ── 푸터 ── -->
  <footer class="footer">
    <div class="footer-brand">
      <img src="images/logo2.png" class="footer-logo-img" alt="The Smith">
      <div>
        <div class="footer-brand-text">The Smith</div>
        <div class="footer-tag">Trust and Sensibility</div>
      </div>
    </div>
    <div class="footer-right">
      <p><strong>T.</strong> 82-31-903-2121 &nbsp;|&nbsp; <strong>F.</strong> 82-31-967-2120</p>
      <p><strong>E.</strong> sales@smithclub.net &nbsp;|&nbsp; <strong>W.</strong> the-smith.net</p>
    </div>
  </footer>

</div>
<script src="js/data.js"></script>
<script src="js/main.js"></script>
</body>
</html>
